server:
  port: 8088

spring:
  # ========== 排除未安装服务的自动配置 ==========
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # ========== MongoDB ==========
  data:
    mongodb:
      host: localhost
      port: 27017
      database: bilibili_analysis
      auto-index-creation: true

  # ========== Redis(未安装, 已排除自动配置) ==========
  # redis:
  #   host: localhost
  #   port: 6379

  # ========== H2(仅用于用户认证) ==========
  datasource:
    url: jdbc:h2:file:./data/userdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# ========== MyBatis ==========
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.massdata.entity
  configuration:
    map-underscore-to-camel-case: true

# ========== JWT ==========
jwt:
  secret: city-platform-secret-key-2024-massdata-analysis
  expiration: 86400000

# ========== 爬虫配置 ==========
spider:
  api-url: https://api.bilibili.com/x/web-interface/search/all/v2
  user-agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36

# ========== Spark配置 ==========
spark:
  enabled: false
  app-name: CityDataMining
  master: local[*]
  checkpoint-dir: ./spark-checkpoint

# ========== HDFS归档 ==========
hdfs:
  hadoop-home: D:\massdatanaly\hadoop-3.5.0
  base-path: /banaly2
  archive-dir: /archive

# ========== HBase(未安装, 预留配置) ==========
# hbase:
#   zookeeper-quorum: localhost
#   zookeeper-port: 2181
